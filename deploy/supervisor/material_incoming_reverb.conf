[program:material_incoming_reverb]
command=/usr/bin/php /var/www/material_incoming/artisan reverb:start --host=0.0.0.0 --port=8080
directory=/var/www/material_incoming
autostart=true
autorestart=true
startsecs=3
stopwaitsecs=10
stopsignal=QUIT
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/material_incoming_reverb.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=10
environment=APP_ENV="production"
